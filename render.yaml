services:
  - type: web
    name: supply-chain-copilot-backend
    plan: free
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PINECONE_API_KEY
        sync: false
      - key: LLAMA_CLOUD_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        value: "gcp-starter"
      - key: PINECONE_INDEX_NAME
        value: "rfp-analyzer"
      - key: UPLOAD_ACCESS_CODE
        value: "dev-access-code"

  - type: web
    name: supply-chain-copilot-frontend
    plan: free
    env: node
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    rootDir: frontend
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: supply-chain-copilot-backend
          envVarKey: RENDER_EXTERNAL_URL
