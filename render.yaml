services:
  - type: web
    name: supply-chain-copilot
    plan: free
    env: python
    buildCommand: "cd ../frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"
      - key: PINECONE_API_KEY
        sync: false
      - key: LLAMA_CLOUD_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        value: "gcp-starter"
      - key: PINECONE_INDEX_NAME
        value: "rfp-analyzer"
      - key: UPLOAD_ACCESS_CODE
        value: "dev-access-code"
